version: '3.8'
services:
  nginx:
    image: nginx:stable-alpine
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./spx-data:/tmp/spx
    depends_on:
      - php
  php:
    build:
      context: ./php
      dockerfile: php.dockerfile
    volumes:
      - ./src:/var/www/html
      - ./spx-data:/tmp/spx
    environment:
      PHP_FPM_PM_STATUS_PATH: /status
    depends_on:
      - redis

  redis:
    image: redis:alpine

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml
    ports:
      - "9090:9090"

  alertmanager:
    build:
      context: ./alertmanager
      dockerfile: alertmanager.dockerfile
    ports:
      - "9093:9093"
    env_file:
      - .env

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"

  php-fpm-exporter:
    image: hipages/php-fpm_exporter
    environment:
      PHP_FPM_SCRAPE_URI: "tcp://php:9000/status"
    ports:
      - "9253:9253"

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter
    command:
      - "-nginx.scrape-uri=http://nginx/nginx_status"
    ports:
      - "9113:9113"

  spx-trigger:
    build: 
      context: ./spx-trigger
      dockerfile: spx.dockerfile
    ports:
      - "8081:8081"
    depends_on:
      - redis
      - prometheus
      - alertmanager
      
