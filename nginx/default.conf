server {
    listen 80;
    server_name localhost;
    index index.php index.html;
    root /var/www/html;


    location / {
        try_files $uri /index.php$is_args$args;
    }
    
    # php-fpm status endpoint
    location ~ ^/(status)$ {
        fastcgi_pass php:9000;
        #allow 127.0.0.1;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_index index.php;
        include fastcgi_params;
    }

    # Nginx metrics endpoint
    location /nginx_status {
        stub_status;
        allow all;
    }


    # metrics endpoints php
    location = /metrics {
        fastcgi_pass php:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/metrics.php;
    }
    
    location ^~ /spx-data/ {
        alias /tmp/spx/;
        autoindex on;

        # optional but useful
        add_header Content-Type application/json;
    }

    # Searchable flamegraph JSONs
    location /flamegraphs {
        fastcgi_pass php:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/flamegraphs.php;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param QUERY_STRING $query_string;
        #fastcgi_param PHP_VALUE "auto_prepend_file=/var/www/html/spx_prepend.php";      
        #fastcgi_param PHP_VALUE "auto_append_file=/var/www/html/spx_append.php";    
                 
    }


}
