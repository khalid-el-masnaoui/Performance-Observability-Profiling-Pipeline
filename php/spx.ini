[spx]
#extension=spx.so

spx.http_enabled=1
spx.http_key=dev
spx.auto_start=0
spx.http_profiling_auto_start=0
spx.http_profiling_enabled=1
spx.builtins=0
spx.http_profiling_builtins=0
spx.http_profiling_metrics="wt,ct,it,zm,zgr,ze,io,ior,iow"
spx.http_ip_whitelist="*,127.0.0.1,localhost"
spx.output_dir="/tmp/spx"

#spx.http_ui_assets_dir = /usr/share/misc/php-spx/assets/web-ui
